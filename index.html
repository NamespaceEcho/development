	<body class="normal">
		<nav class="fade_in" style="--animDelay: 2.25s">

			<div class="flex_center">
				<a href="#" class="text_mask">Rise</a>

			<a href="#" class="text_mask">About</a>

		<div id="leading_content">
			<div class="fill_view center_grid" style="background-color: black; position: relative;">
				<div>
					<div class="typewriter">
						<h1>&lt;Namespace&gt; Development</h1>
					</div>
					<p class="fade_in" id="special_message">Run by "Echo"</p>
				</div>
				
				<div class="fade_in" style="--animDelay: 2.25s; position: absolute; bottom: 32px;">

					<a href="#welcome" class="arrow link_arrow vertical_arrow">&DownArrow;</a>
				</div>
			</div>
		</div>
		
		<main>
			<!-- WELCOME TO -->
			<!-- SHOWCASE -->
			<div id="welcome" class="gallery intersecting_content">
				<div class="gallery_view">
					<div class="slide" style="background-color: #00000040">
						<p>Item 1</p>
						<p>Item 1</p>
						<button>Item 1</button>
					</div>
					<div class="slide" style="background-color: #00000040">
						<p>Item 2</p>
						<p>Item 2</p>
						<button>Item 2</button>
					</div>
					<div class="slide" style="background-color: #00000040">
						<p>Item 3</p>
					</div>
					<div class="slide" style="background-color: #00000040">
						<p>Item 4</p>
					</div>
				</div>
			</div>
		</main>
	<body>
	<script>
		let msgDisplay = document.getElementById("special_message");
		let messages =
		[
			"'Echo' made this.",
			"Earth to 'Echo'... wake up!",
			"How many times did you reload?",
			"I make a lot of things.",
			"My back still hurts.",
			"I need a nap.",
			"I love my ghost husband.",
			"Everything is not what it seems...",
			"Ghosts can give birth apparently...",
			"Am I famous yet?",
			"Locally sourced Mexican labor.",
			"Medulla oblongata - A blue shark",
			"Did you check your pockets?",
			"My husband suggested this...",
			"Karate judo samurai!",
			"My friends are machines... shut up!",
			"Very accident prone.",
			"Environmentally friendly.",
			"On a RAM diet.",
			"This site is not Vegan.",
		];
		
		msgDisplay.innerText = messages[Math.floor(Math.random() * (messages.length))];
		
		const intersectingContent = document.getElementsByClassName("intersecting_content");
		const intersector = new IntersectionObserver((element) =>
		{
			element.forEach(i =>
			{
				i.target.animate(
					[
						{
							opacity: i.isIntersecting ? 0 : 1
						},
						{
							opacity: i.isIntersecting ? 1 : 0
						}
					],
					{
						duration: 500,
						fill: "forwards"
					}
				);
			});
		},
		{
			threshold: 0.25
		});
		
		for (let i = 0; i < intersectingContent.length; i++) {
			const element = intersectingContent[i];
			intersector.observe(element);
		}
	</script>
</html>
